<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LaTeXSnipper Office Plugin Settings</title>
  <link rel="stylesheet" href="./settings.css">
</head>
<body>
  <main class="shell">
    <header class="header">
      <div>
        <h1 data-i18n="title">LaTeXSnipper Office 插件设置</h1>
        <p data-i18n="subtitle">配置编辑器键盘行为。</p>
      </div>
    </header>

    <section class="panel">
      <h2 data-i18n="editorTitle">编辑器键盘行为</h2>
      <div class="key-list">
        <div><kbd>Ctrl</kbd><span>+</span><kbd>Enter</kbd><span data-i18n="newlineShortcut">在公式编辑器中换行</span></div>
        <div><kbd>Esc</kbd><span data-i18n="cancelShortcut">关闭编辑器，不应用更改</span></div>
      </div>
    </section>

  </main>
  <script src="./settings.js"></script>
</body>
</html>
