<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathLive Bridge Panel</title>
  <style>
    :root {
      --bg: #1c212a;
      --border: #303845;
      --text: #e6ebf2;
      --muted: #94a3b8;
      --scroll-track: rgba(255, 255, 255, 0.02);
      --scroll-thumb: rgba(130, 152, 187, 0.34);
      --scroll-thumb-hover: rgba(130, 152, 187, 0.6);
    }
    body[data-theme="light"] {
      --bg: #ffffff;
      --border: #d7deea;
      --text: #1c2430;
      --muted: #66768d;
      --scroll-track: rgba(15, 23, 42, 0.03);
      --scroll-thumb: rgba(116, 136, 168, 0.26);
      --scroll-thumb-hover: rgba(116, 136, 168, 0.52);
    }
    * { box-sizing: border-box; }
    html, body, .shell, #mathfield-host, math-field {
      scrollbar-width: thin;
      scrollbar-color: var(--scroll-thumb) transparent;
    }
    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    *::-webkit-scrollbar-track {
      background: var(--scroll-track);
      border-radius: 999px;
    }
    *::-webkit-scrollbar-thumb {
      background: var(--scroll-thumb);
      border-radius: 999px;
      border: 3px solid transparent;
      background-clip: padding-box;
    }
    *::-webkit-scrollbar-thumb:hover {
      background: var(--scroll-thumb-hover);
      background-clip: padding-box;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    .shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 0;
      gap: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    #mathfield-host {
      position: relative;
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      border: 0;
      border-radius: 0;
      padding: 14px 16px;
      overflow-x: auto;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.035);
    }
    math-field {
      display: block;
      flex: 1 1 auto;
      width: 100%;
      min-height: 100%;
      height: 100%;
      max-height: none;
      font-size: 22px;
      background: transparent;
      color: var(--text);
      border: none;
      border-radius: 0;
      padding: 0;
      outline: none;
      box-shadow: none;
      overflow-x: auto;
      overflow-y: auto;
    }
    math-field::part(container) {
      min-height: inherit;
      border: 0;
      background: transparent;
      box-shadow: none;
    }
    math-virtual-keyboard {
      position: fixed !important;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
      width: auto !important;
      max-height: min(48vh, 360px);
      border-top: 1px solid var(--border);
      box-shadow: 0 -12px 28px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }
    body[data-theme="light"] #mathfield-host {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(247, 250, 255, 0.96));
    }
  </style>
</head>
<body>
  <div class="shell">
    <div id="mathfield-host"></div>
  </div>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script type="module" src="./bridge_panel.js"></script>
</body>
</html>
