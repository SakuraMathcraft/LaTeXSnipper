<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LaTeXSnipper Word</title>
    <link rel="stylesheet" href="./taskpane.css">
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script type="module" src="./taskpane.js"></script>
  </head>
  <body>
    <main class="pane-shell">
      <section class="section header-section">
        <div class="section-heading app-heading">
          <h1>LaTeXSnipper</h1>
          <span id="host-status" class="status-pill">Waiting for Word</span>
        </div>
      </section>

      <section class="section editor-section" aria-labelledby="editor-heading">
        <div class="section-heading">
          <h2 id="editor-heading">Formula</h2>
          <span id="editor-status" class="subtle-status">Math editor unavailable; using LaTeX source</span>
        </div>

        <div
          id="formula-preview"
          class="formula-preview"
          aria-live="polite"
          aria-label="Formula preview"
        >Preview</div>

        <label class="input-label" for="latex-input">LaTeX source</label>
        <textarea
          id="latex-input"
          class="latex-input"
          spellcheck="false"
          autocomplete="off"
          placeholder="x^2 + y^2 = z^2"
        ></textarea>
      </section>

      <section class="section options-section" aria-labelledby="options-heading">
        <h2 id="options-heading">Options</h2>
        <fieldset class="mode-fieldset">
          <legend class="visually-hidden">Formula mode</legend>
          <label class="mode-option">
            <input type="radio" name="formula-mode" value="inline" checked>
            <span>Inline formula</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="formula-mode" value="display">
            <span>Display formula</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="formula-mode" value="numbered">
            <span>Numbered display formula</span>
          </label>
        </fieldset>

        <label class="input-label" for="manual-number">Manual number</label>
        <input
          id="manual-number"
          class="number-input"
          type="text"
          inputmode="text"
          autocomplete="off"
          placeholder="#"
          disabled
        >
      </section>

      <section class="section action-section" aria-labelledby="actions-heading">
        <h2 id="actions-heading">Actions</h2>
        <div class="button-grid">
          <button id="insert-inline-button" class="primary-button" type="button">Insert Inline</button>
          <button id="insert-display-button" class="secondary-button" type="button">Insert Display</button>
          <button id="insert-numbered-button" class="secondary-button" type="button">Insert Numbered</button>
          <button id="clear-button" class="secondary-button" type="button">Clear</button>
        </div>

        <p id="operation-status" class="operation-status" role="status">Ready</p>
      </section>

      <section class="section bridge-section" aria-labelledby="bridge-heading">
        <h2 id="bridge-heading">OCR Bridge</h2>
        <dl class="bridge-status">
          <div>
            <dt>Bridge</dt>
            <dd>Not connected</dd>
          </div>
          <div>
            <dt>OCR</dt>
            <dd>Coming soon</dd>
          </div>
        </dl>
        <button id="ocr-button" class="secondary-button" type="button" disabled>OCR coming soon</button>
      </section>
    </main>
  </body>
</html>
