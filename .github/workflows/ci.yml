name: CI

on:
  push:
    branches:
      - main
      - develop
      - MathCraft
  pull_request:
    branches:
      - main
      - develop
      - MathCraft
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-check:
    name: Compile Check
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Byte-compile source tree
        run: python -m compileall -q -x "src[\\/]+deps" src mathcraft_ocr

      - name: Byte-compile key entry files
        run: python -m py_compile src/main.py src/bootstrap/deps_bootstrap.py src/updater.py LaTeXSnipper.spec

      - name: Validate Python comment language
        shell: pwsh
        run: |
          @'
          import ast
          import io
          import pathlib
          import tokenize

          roots = [pathlib.Path("src"), pathlib.Path("mathcraft_ocr"), pathlib.Path("scripts")]
          violations = []
          for root in roots:
              if not root.exists():
                  continue
              for path in sorted(root.rglob("*.py")):
                  if "deps" in path.parts:
                      continue
                  text = path.read_text(encoding="utf-8", errors="replace")
                  for token in tokenize.generate_tokens(io.StringIO(text).readline):
                      if token.type == tokenize.COMMENT and any(ord(ch) > 127 for ch in token.string):
                          violations.append(f"{path}:{token.start[0]} non-ASCII comment")
                  try:
                      tree = ast.parse(text)
                  except SyntaxError:
                      continue
                  for node in ast.walk(tree):
                      if not isinstance(node, (ast.Module, ast.ClassDef, ast.FunctionDef, ast.AsyncFunctionDef)):
                          continue
                      if not node.body:
                          continue
                      first = node.body[0]
                      if (
                          isinstance(first, ast.Expr)
                          and isinstance(first.value, ast.Constant)
                          and isinstance(first.value.value, str)
                          and any(ord(ch) > 127 for ch in first.value.value)
                      ):
                          violations.append(f"{path}:{first.lineno} non-ASCII docstring")
          if violations:
              raise SystemExit("\n".join(violations))
          '@ | python -

      - name: Validate cross-platform packaging metadata
        shell: pwsh
        run: |
          $required = @(
            "Inno\ChineseSimplified.isl",
            "LaTeXSnipper-linux.spec",
            "LaTeXSnipper-macos.spec",
            "scripts\build_deb.sh",
            "scripts\build_macos.sh",
            "scripts\package_common.sh",
            "packaging\debian\DEBIAN\control"
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Required packaging file is missing: $path"
            }
          }
          $iss = "Inno\latexsnipper.iss"
          $text = Get-Content -LiteralPath $iss -Raw
          if ($text -notmatch [regex]::Escape('DefaultDirName={localappdata}\{#MyAppName}')) {
            throw "Inno script must install under localappdata by default: $iss"
          }
          if ($text -notmatch '(?m)^PrivilegesRequired=lowest\r?$') {
            throw "Inno per-user installer must use PrivilegesRequired=lowest: $iss"
          }
          if ($text -match '(?m)^PrivilegesRequired=admin\r?$') {
            throw "Inno per-user installer must not request admin privileges: $iss"
          }
          if ($text -notmatch [regex]::Escape('MessagesFile: "{#MyRepoRoot}\Inno\ChineseSimplified.isl"')) {
            throw "Inno script must use the repository Simplified Chinese language file: $iss"
          }
          foreach ($specPath in @("LaTeXSnipper-linux.spec", "LaTeXSnipper-macos.spec")) {
            $specText = Get-Content -LiteralPath $specPath -Raw
            if ($specText -match "deps/python311|LATEXSNIPPER_BUNDLE_PYTHON_RUNTIME|BUNDLED_PY311|BUNDLED_DEPS_DIR_ENV") {
              throw "Linux/macOS release specs must not bundle build-machine Python runtimes: $specPath"
            }
          }
          $release = Get-Content -LiteralPath ".github\workflows\release.yml" -Raw
          foreach ($job in @("build-windows-installer", "build-linux-deb", "build-macos-app", "publish-release-assets")) {
            if ($release -notmatch "(?m)^  ${job}:") {
              throw "Release workflow is missing job: $job"
            }
          }
          foreach ($workflow in @((Get-Content -LiteralPath ".github\workflows\ci.yml" -Raw), $release)) {
            if ($workflow -match "actions/checkout@v[0-5]\b") {
              throw "GitHub Actions checkout must use a Node 24 version."
            }
            if ($workflow -match "actions/setup-python@v[0-5]\b") {
              throw "GitHub Actions setup-python must use a Node 24 version."
            }
            if ($workflow -match "actions/(upload-artifact|download-artifact)@v[0-6]\b") {
              throw "GitHub Actions artifact actions must use Node 24 versions."
            }
            if ($workflow -match "runs-on:\s*windows-latest") {
              throw "Windows workflows must pin windows-2025 instead of windows-latest."
            }
          }
          foreach ($path in @(
            "scripts\build_deb.sh",
            "scripts\build_macos.sh",
            "scripts\package_common.sh",
            "requirements.txt",
            "requirements-build.txt",
            "requirements-linux.txt",
            "requirements-macos.txt",
            "packaging\debian\DEBIAN\postinst",
            "packaging\debian\DEBIAN\postrm",
            "packaging\debian\DEBIAN\prerm"
          )) {
            $content = Get-Content -LiteralPath $path -Raw
            $nonAscii = $content.ToCharArray() | Where-Object { [int]$_ -gt 127 } | Select-Object -First 1
            if ($null -ne $nonAscii) {
              throw "Packaging script/config must stay ASCII-only: $path"
            }
          }

      - name: Byte-compile cross-platform specs
        run: python -m py_compile LaTeXSnipper-linux.spec LaTeXSnipper-macos.spec
