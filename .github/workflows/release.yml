name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    env:
      SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
      SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements-build.txt

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Prepare bundled Python seed
        shell: pwsh
        run: |
          $installer = Join-Path $PWD "python-3.11.0-amd64.exe"
          $target = Join-Path $PWD "python311"
          Invoke-WebRequest `
            -Uri "https://www.python.org/ftp/python/3.11.0/python-3.11.0-amd64.exe" `
            -OutFile $installer
          $signature = Get-AuthenticodeSignature $installer
          if ($signature.Status -ne "Valid" -or $signature.SignerCertificate.Subject -notlike "*Python Software Foundation*") {
            throw "Downloaded Python installer signature is not trusted: $($signature.Status) $($signature.SignerCertificate.Subject)"
          }
          $process = Start-Process `
            -FilePath $installer `
            -ArgumentList @(
              "/quiet",
              "InstallAllUsers=0",
              "TargetDir=$target",
              "Include_pip=1",
              "Include_tcltk=1",
              "Include_launcher=0",
              "Include_test=0",
              "Include_doc=0",
              "PrependPath=0",
              "Shortcuts=0"
            ) `
            -Wait `
            -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Python installer failed with exit code $($process.ExitCode)"
          }
          if (-not (Test-Path (Join-Path $target "python.exe"))) {
            throw "Bundled Python seed was not created: $target"
          }
          & (Join-Path $target "python.exe") -m pip install --upgrade pip wheel setuptools

      - name: Build unsigned installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts\build_github_release_installer.ps1 -Flavor normal -PythonPath python

      - name: Upload unsigned installer artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-latexsnipper-installer
          path: dist/installer/LaTeXSnipperSetup-*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Check SignPath configuration
        id: signpath-config
        shell: pwsh
        run: |
          $missing = @()
          foreach ($name in @(
            "SIGNPATH_ORGANIZATION_ID",
            "SIGNPATH_PROJECT_SLUG",
            "SIGNPATH_SIGNING_POLICY_SLUG",
            "SIGNPATH_ARTIFACT_CONFIGURATION_SLUG",
            "SIGNPATH_API_TOKEN"
          )) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            "enabled=false" >> $env:GITHUB_OUTPUT
            "missing=$($missing -join ', ')" >> $env:GITHUB_OUTPUT
            Write-Host "SignPath is not configured: $($missing -join ', ')"
          }
          else {
            "enabled=true" >> $env:GITHUB_OUTPUT
            "missing=" >> $env:GITHUB_OUTPUT
            Write-Host "SignPath is configured."
          }

      - name: Require SignPath for tag releases
        if: ${{ startsWith(github.ref, 'refs/tags/v') && steps.signpath-config.outputs.enabled != 'true' }}
        shell: pwsh
        run: |
          throw "Tag releases require SignPath. Missing: ${{ steps.signpath-config.outputs.missing }}"

      - name: Submit installer to SignPath
        id: signpath
        if: ${{ steps.signpath-config.outputs.enabled == 'true' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Write signed installer SHA256
        if: ${{ steps.signpath.outcome == 'success' }}
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path signed -Filter *.exe -Recurse
          if ($files.Count -eq 0) {
            throw "SignPath completed, but no signed installer was found."
          }
          foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLowerInvariant()
            $shaPath = "$($file.FullName).sha256"
            [System.IO.File]::WriteAllText(
              $shaPath,
              "$hash  $($file.Name)`n",
              [System.Text.UTF8Encoding]::new($false)
            )
          }

      - name: Upload signed installer artifact
        if: ${{ steps.signpath.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: signed-latexsnipper-installer
          path: signed/**
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release assets
        if: ${{ startsWith(github.ref, 'refs/tags/v') && steps.signpath.outcome == 'success' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            signed/**/*.exe
            signed/**/*.sha256

  build-linux-deb:
    name: Build Linux .deb
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements-build.txt
          python -m pip install -r requirements-linux.txt 2>/dev/null || true
          python -m pip install pyinstaller>=6

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller \
            --distpath dist \
            --workpath build/pyinstaller_linux \
            --noconfirm \
            LaTeXSnipper-linux.spec

      - name: Package as .deb
        run: |
          mkdir -p dist
          VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' pyproject.toml | head -1)
          if [[ -z "$VERSION" ]]; then
            VERSION=$(grep -oP 'filevers=\s*\(\s*\K[0-9]+,\s*[0-9]+,\s*[0-9]+' version_info.txt | head -1 | tr -d ' ' | tr ',' '.')
          fi
          echo "Version: $VERSION"

          PACKAGING_DIR="packaging/debian"
          DEB_LIB_DIR="$PACKAGING_DIR/usr/lib/latexsnipper"

          # Clean and recreate target
          rm -rf "$DEB_LIB_DIR"
          mkdir -p "$DEB_LIB_DIR"

          # Copy PyInstaller output
          if [[ -d "dist/LaTeXSnipper" ]]; then
            cp -a dist/LaTeXSnipper/* "$DEB_LIB_DIR/"
          fi

          # Ensure permissions
          chmod 755 "$DEB_LIB_DIR/LaTeXSnipper" 2>/dev/null || true
          find "$PACKAGING_DIR/usr/lib/latexsnipper" -type f -name "*.so*" -exec chmod 755 {} \; 2>/dev/null || true
          chmod 755 "$PACKAGING_DIR/usr/bin/latexsnipper" 2>/dev/null || true
          chmod 755 "$PACKAGING_DIR/DEBIAN/postinst" 2>/dev/null || true
          chmod 755 "$PACKAGING_DIR/DEBIAN/prerm" 2>/dev/null || true
          chmod 755 "$PACKAGING_DIR/DEBIAN/postrm" 2>/dev/null || true

          # Calculate installed size
          INSTALLED_SIZE=$(du -sk "$PACKAGING_DIR/usr" 2>/dev/null | cut -f1)
          INSTALLED_SIZE=${INSTALLED_SIZE:-1}

          # Update control file
          sed -i "s/^Version:.*/Version: ${VERSION}/" "$PACKAGING_DIR/DEBIAN/control"
          sed -i "s/^Installed-Size:.*/Installed-Size: ${INSTALLED_SIZE}/" "$PACKAGING_DIR/DEBIAN/control"

          # Build .deb
          cd packaging
          dpkg-deb --root-owner-group --build debian "../dist/latexsnipper_${VERSION}_amd64.deb"
          cd ..

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: latexsnipper-deb
          path: dist/latexsnipper_*.deb
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release assets
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/latexsnipper_*.deb

  build-macos-app:
    name: Build macOS .app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements-build.txt
          python -m pip install -r requirements-macos.txt 2>/dev/null || true
          python -m pip install pyinstaller>=6

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller \
            --distpath dist \
            --workpath build/pyinstaller_macos \
            --noconfirm \
            LaTeXSnipper-macos.spec

      - name: Verify .app bundle
        run: |
          APP_PATH=$(find dist -maxdepth 3 -name "*.app" -type d | head -1)
          if [[ -z "$APP_PATH" ]]; then
            echo "ERROR: .app bundle not found"
            ls -la dist/
            exit 1
          fi
          echo "App bundle: $APP_PATH"
          ls -la "$APP_PATH/Contents/MacOS/"

      - name: Create DMG (optional)
        run: |
          APP_PATH=$(find dist -maxdepth 3 -name "*.app" -type d | head -1)
          if [[ -n "$APP_PATH" ]] && command -v create-dmg &>/dev/null; then
            VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' pyproject.toml | head -1)
            ARCH=$(uname -m)
            create-dmg \
              --volname "LaTeXSnipper ${VERSION}" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --icon "LaTeXSnipper.app" 150 190 \
              --hide-extension "LaTeXSnipper.app" \
              --app-drop-link 450 185 \
              "dist/LaTeXSnipper_${VERSION}_${ARCH}.dmg" \
              "$(dirname "$APP_PATH")"
          fi

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: latexsnipper-macos-app
          path: |
            dist/*.app/**/*
            dist/*.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release assets
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.dmg
