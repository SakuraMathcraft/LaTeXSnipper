name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing GitHub Release tag to upload assets to"
        required: true
        default: "v2.3.2_Final_Stable"
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows-installer:
    name: Build Windows Installer
    runs-on: windows-2025
    env:
      SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
      SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
      SIGNPATH_OFFICE_ADDIN_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_OFFICE_ADDIN_ARTIFACT_CONFIGURATION_SLUG }}
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: office_addin/package-lock.json

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-build.txt

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Install Office add-in dependencies
        shell: pwsh
        run: npm ci --prefix office_addin

      - name: Prepare bundled Python seed
        shell: pwsh
        run: |
          $installer = Join-Path $PWD "python-3.11.0-amd64.exe"
          $target = Join-Path $PWD "python311"
          Invoke-WebRequest `
            -Uri "https://www.python.org/ftp/python/3.11.0/python-3.11.0-amd64.exe" `
            -OutFile $installer
          $signature = Get-AuthenticodeSignature $installer
          if ($signature.Status -ne "Valid" -or $signature.SignerCertificate.Subject -notlike "*Python Software Foundation*") {
            throw "Downloaded Python installer signature is not trusted: $($signature.Status) $($signature.SignerCertificate.Subject)"
          }
          $process = Start-Process `
            -FilePath $installer `
            -ArgumentList @(
              "/quiet",
              "InstallAllUsers=0",
              "TargetDir=$target",
              "Include_pip=1",
              "Include_tcltk=1",
              "Include_launcher=0",
              "Include_test=0",
              "Include_doc=0",
              "PrependPath=0",
              "Shortcuts=0"
            ) `
            -Wait `
            -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Python installer failed with exit code $($process.ExitCode)"
          }
          if (-not (Test-Path (Join-Path $target "python.exe"))) {
            throw "Bundled Python seed was not created: $target"
          }
          & (Join-Path $target "python.exe") -m pip install --upgrade pip wheel setuptools

      - name: Build unsigned installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts\build_github_release_installer.ps1 -PythonPath python

      - name: Upload unsigned installer artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-latexsnipper-installer
          path: dist/installer/LaTeXSnipperSetup-*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Build unsigned Office local runtime installer and deployment manifests
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts\build_office_addin_installer.ps1

      - name: Upload unsigned Office runtime and deployment artifact
        id: upload-office-addin-unsigned
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-latexsnipper-office-addin-windows
          path: |
            dist/office-addin/OfficeAddinSetup-*.exe
            dist/office-addin/OfficeAddinSetup-*.exe.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Upload Office persistent deployment manifests
        uses: actions/upload-artifact@v7
        with:
          name: latexsnipper-office-deployment-manifests
          path: dist/office-addin/OfficeDeploymentManifests-*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Check SignPath configuration
        id: signpath-config
        shell: pwsh
        run: |
          $missing = @()
          foreach ($name in @(
            "SIGNPATH_ORGANIZATION_ID",
            "SIGNPATH_PROJECT_SLUG",
            "SIGNPATH_SIGNING_POLICY_SLUG",
            "SIGNPATH_ARTIFACT_CONFIGURATION_SLUG",
            "SIGNPATH_API_TOKEN"
          )) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            "enabled=false" >> $env:GITHUB_OUTPUT
            "missing=$($missing -join ', ')" >> $env:GITHUB_OUTPUT
            Write-Host "SignPath is not configured: $($missing -join ', ')"
          }
          else {
            "enabled=true" >> $env:GITHUB_OUTPUT
            "missing=" >> $env:GITHUB_OUTPUT
            Write-Host "SignPath is configured."
          }

      - name: Skip Windows signing when SignPath is unavailable
        if: ${{ steps.signpath-config.outputs.enabled != 'true' }}
        shell: pwsh
        run: |
          Write-Host "SignPath is not configured. The unsigned Windows installer will be published instead. Missing: ${{ steps.signpath-config.outputs.missing }}"

      - name: Submit installer to SignPath
        id: signpath
        if: ${{ steps.signpath-config.outputs.enabled == 'true' }}
        continue-on-error: true
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Write signed installer SHA256
        if: ${{ steps.signpath.outcome == 'success' }}
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path signed -Filter *.exe -Recurse
          if ($files.Count -eq 0) {
            throw "SignPath completed, but no signed installer was found."
          }
          foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLowerInvariant()
            $shaPath = "$($file.FullName).sha256"
            [System.IO.File]::WriteAllText(
              $shaPath,
              "$hash  $($file.Name)`n",
              [System.Text.UTF8Encoding]::new($false)
            )
          }

      - name: Upload signed installer artifact
        if: ${{ steps.signpath.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: signed-latexsnipper-installer
          path: signed/**
          if-no-files-found: error
          retention-days: 30

      - name: Check Office add-in SignPath configuration
        id: office-signpath-config
        shell: pwsh
        run: |
          $missing = @()
          foreach ($name in @(
            "SIGNPATH_ORGANIZATION_ID",
            "SIGNPATH_PROJECT_SLUG",
            "SIGNPATH_SIGNING_POLICY_SLUG",
            "SIGNPATH_OFFICE_ADDIN_ARTIFACT_CONFIGURATION_SLUG",
            "SIGNPATH_API_TOKEN"
          )) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            "enabled=false" >> $env:GITHUB_OUTPUT
          }
          else {
            "enabled=true" >> $env:GITHUB_OUTPUT
          }

      - name: Submit Office local runtime installer to SignPath
        id: office-signpath
        if: ${{ steps.office-signpath-config.outputs.enabled == 'true' }}
        continue-on-error: true
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_OFFICE_ADDIN_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-office-addin-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: office-addin-signed

      - name: Upload signed Office local runtime installer artifact
        if: ${{ steps.office-signpath.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: signed-latexsnipper-office-addin-windows
          path: office-addin-signed/**
          if-no-files-found: error
          retention-days: 30

  build-linux-deb:
    name: Build Linux .deb
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Linux build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          APT_OPTS=(
            -o Acquire::Retries=5
            -o Acquire::http::Timeout=30
            -o Acquire::https::Timeout=30
            -o Dpkg::Use-Pty=0
          )
          sudo -E timeout 6m apt-get "${APT_OPTS[@]}" update
          sudo -E timeout 12m apt-get "${APT_OPTS[@]}" install -y --no-install-recommends \
            dpkg-dev \
            libasound2 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libegl1 \
            libfontconfig1 \
            libgdk-pixbuf-2.0-0 \
            libgl1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnss3 \
            libopengl0 \
            libpulse0 \
            libx11-6 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxcomposite1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxkbcommon-x11-0 \
            libxkbcommon0 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            zlib1g

      - name: Build .deb
        run: |
          chmod +x scripts/*.sh
          ./scripts/build_deb.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: latexsnipper-linux-deb
          path: |
            dist/*.deb
            dist/SHA256SUMS-linux.txt
          if-no-files-found: error
          retention-days: 30

  build-macos-app:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: office_addin/package-lock.json

      - name: Install macOS packaging tools
        run: brew install create-dmg

      - name: Install Office add-in dependencies
        run: npm ci --prefix office_addin

      - name: Build macOS app
        run: |
          chmod +x scripts/*.sh
          ./scripts/build_macos.sh
          ./scripts/build_office_addin_macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: latexsnipper-macos
          path: |
            dist/*.dmg
            dist/*.app.zip
            dist/SHA256SUMS-macos.txt
            dist/office-addin/*.pkg
            dist/office-addin/SHA256SUMS-office-addin-macos.txt
          if-no-files-found: error
          retention-days: 30

  publish-release-assets:
    name: Publish Release Assets
    if: ${{ always() && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && needs.build-linux-deb.result == 'success' && needs.build-macos-app.result == 'success' }}
    runs-on: ubuntu-latest
    needs:
      - build-windows-installer
      - build-linux-deb
      - build-macos-app
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: List release assets
        run: find release-assets -maxdepth 3 -type f -print

      - name: Prepare release upload directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf publish-assets
          mkdir -p publish-assets

          if [[ -d release-assets/signed-latexsnipper-installer ]]; then
            signed_count="$(find release-assets/signed-latexsnipper-installer -type f -name 'LaTeXSnipperSetup-*.exe' | wc -l | tr -d ' ')"
          else
            signed_count="0"
          fi

          if [[ "${signed_count}" != "0" ]]; then
            echo "Using signed Windows installer."
            find release-assets/signed-latexsnipper-installer -type f -name 'LaTeXSnipperSetup-*.exe' -exec cp -v {} publish-assets/ \;
          elif [[ -d release-assets/unsigned-latexsnipper-installer ]]; then
            unsigned_count="$(find release-assets/unsigned-latexsnipper-installer -type f -name 'LaTeXSnipperSetup-*.exe' | wc -l | tr -d ' ')"
            if [[ "${unsigned_count}" != "0" ]]; then
              echo "Signed Windows installer is missing; using unsigned Windows installer."
              find release-assets/unsigned-latexsnipper-installer -type f -name 'LaTeXSnipperSetup-*.exe' -exec cp -v {} publish-assets/ \;
            else
              echo "Unsigned Windows installer artifact exists but contains no LaTeXSnipperSetup-*.exe; skipping Windows release asset."
            fi
          else
            echo "No signed or unsigned Windows installer artifact found; skipping Windows release asset."
          fi

          if [[ -d release-assets/signed-latexsnipper-office-addin-windows ]] && \
             find release-assets/signed-latexsnipper-office-addin-windows -type f -name 'OfficeAddinSetup-*.exe' -print -quit | grep -q .; then
            find release-assets/signed-latexsnipper-office-addin-windows -type f -name 'OfficeAddinSetup-*.exe' -exec cp -v {} publish-assets/ \;
          elif [[ -d release-assets/unsigned-latexsnipper-office-addin-windows ]]; then
            find release-assets/unsigned-latexsnipper-office-addin-windows -type f -name 'OfficeAddinSetup-*.exe' -exec cp -v {} publish-assets/ \;
          else
            echo "No Windows Office add-in artifact is available for this release."
          fi
          if [[ -d release-assets/latexsnipper-office-deployment-manifests ]]; then
            find release-assets/latexsnipper-office-deployment-manifests -type f -name 'OfficeDeploymentManifests-*.zip' -exec cp -v {} publish-assets/ \;
          fi

          find release-assets/latexsnipper-linux-deb -type f -name '*.deb' -exec cp -v {} publish-assets/ \;
          find release-assets/latexsnipper-macos -type f \( -name '*.dmg' -o -name '*.app.zip' \) -exec cp -v {} publish-assets/ \;
          find release-assets/latexsnipper-macos -type f -name 'OfficeAddin-*.pkg' -exec cp -v {} publish-assets/ \;

          asset_count="$(find publish-assets -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [[ "${asset_count}" == "0" ]]; then
            echo "No release assets were staged." >&2
            find release-assets -maxdepth 4 -type f -print >&2
            exit 1
          fi

          echo "Release upload assets:"
          find publish-assets -maxdepth 1 -type f -print

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          if [[ -z "$tag" ]]; then
            echo "Release tag is empty." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publishing assets to release tag: $tag"

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: ${{ github.event_name != 'workflow_dispatch' }}
          overwrite_files: true
          files: publish-assets/*
