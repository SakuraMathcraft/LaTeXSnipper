name: Sync User Manual

on:
  push:
    paths:
      - "user_manual/user_manual.typ"
    branches:
      - main
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger manual rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MANUAL_SYNC_PAT }}
          repository: SakuraMathcraft/LaTeXSnipper_user_manual
          event-type: build-user-manual
          client-payload: '{"source": "LaTeXSnipper", "ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
